
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Complaint Routing</title>

<style>
:root {
    --bg: #f4f6f8;
    --card: white;
    --text: black;
    --primary: #007bff;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f1f5f9;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
}

.container {
    width: 400px;
    margin: 80px auto;
    background: var(--card);
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
}

h2 {
    text-align: center;
}

textarea, input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    opacity: 0.9;
}

.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    font-size: 18px;
}

.result {
    margin-top: 15px;
    padding: 10px;
    border-left: 5px solid var(--primary);
    background: rgba(0,123,255,0.1);
}
</style>

</head>
<body>

    

<!-- 🔴 LOGOUT BUTTON (ADD HERE) -->
<a href="/logout" style="position:absolute; top:20px; right:80px;">
    <button style="padding:8px 12px; border:none; border-radius:8px; background:red; color:white;">
        Logout
    </button>
</a>

<div class="toggle" onclick="toggleMode()">🌙 / ☀️</div>

<div class="container">
    <h2>Complaint System</h2>

    <form method="POST" action="/main">
        <input type="text" name="area" placeholder="Enter your area">
        <textarea name="complaint" placeholder="Write your complaint..."></textarea>
        <button type="submit">Submit</button>
    </form>

    {% if result %}
    <div class="result">
        <strong>{{ result }}</strong>
    </div>
    {% endif %}
</div>

<script>
function toggleMode() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
