<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Complaint Routing</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(
        135deg,
        #eef2ff,
        #f8fafc,
        #dbeafe
    );

    min-height:100vh;
}

/* NAVBAR */

.navbar{

    width:100%;

    background:white;

    padding:18px 50px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 5px 20px rgba(0,0,0,0.08);

    position:sticky;

    top:0;

    z-index:1000;
}

.logo{

    font-size:28px;

    font-weight:700;

    color:#2563eb;
}

.nav-links{

    display:flex;

    gap:15px;

    align-items:center;
}

.nav-links a{

    text-decoration:none;
}

.nav-btn{

    border:none;

    padding:12px 18px;

    border-radius:12px;

    cursor:pointer;

    font-weight:600;

    transition:0.3s;

    color:white;
}

.home-btn{
    background:#2563eb;
}

.complaint-btn{
    background:#7c3aed;
}

.history-btn{
    background:#16a34a;
}

.stats-btn{
    background:#ea580c;
}

.logout-btn{
    background:#dc2626;
}

.nav-btn:hover{

    transform:translateY(-2px);

    opacity:0.9;
}

/* HERO */

.hero{

    text-align:center;

    margin-top:50px;

    padding:20px;
}

.hero h1{

    font-size:48px;

    color:#111827;

    margin-bottom:15px;
}

.hero p{

    font-size:18px;

    color:#6b7280;
}

/* MAIN CARD */

.container{

    width:100%;

    max-width:700px;

    margin:40px auto;

    background:white;

    padding:35px;

    border-radius:25px;

    box-shadow:0 15px 40px rgba(0,0,0,0.12);

    position:relative;

    overflow:hidden;
}

.container::before{

    content:"";

    position:absolute;

    top:-100px;
    right:-100px;

    width:220px;
    height:220px;

    background:

    linear-gradient(
        135deg,
        #3b82f6,
        #8b5cf6
    );

    border-radius:50%;

    opacity:0.15;
}

.card-title{

    text-align:center;

    margin-bottom:25px;

    color:#111827;

    font-size:30px;
}

/* FORM */

.input-group{

    margin-bottom:20px;
}

label{

    display:block;

    margin-bottom:8px;

    font-weight:500;

    color:#374151;
}

input,
textarea{

    width:100%;

    padding:15px;

    border:2px solid #e5e7eb;

    border-radius:14px;

    font-size:15px;

    transition:0.3s;

    background:#f9fafb;
}

input:focus,
textarea:focus{

    outline:none;

    border-color:#2563eb;

    background:white;

    box-shadow:
    0 0 0 4px
    rgba(37,99,235,0.15);
}

textarea{

    min-height:150px;

    resize:none;
}

/* SUBMIT BUTTON */

.submit-btn{

    width:100%;

    padding:16px;

    border:none;

    border-radius:14px;

    background:

    linear-gradient(
        135deg,
        #2563eb,
        #7c3aed
    );

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    margin-top:10px;

    box-shadow:
    0 10px 20px
    rgba(37,99,235,0.25);
}

.submit-btn:hover{

    transform:translateY(-2px);

    opacity:0.95;
}

/* RESULT */

.result{

    margin-top:25px;

    padding:18px;

    border-radius:15px;

    background:#eff6ff;

    border-left:6px solid #2563eb;

    color:#1e3a8a;

    font-weight:500;
}

/* FOOTER */

.footer{

    text-align:center;

    margin-top:40px;

    padding:20px;

    color:#6b7280;

    font-size:14px;
}

/* MOBILE */

@media(max-width:768px){

    .navbar{

        flex-direction:column;

        gap:15px;

        padding:20px;
    }

    .nav-links{

        flex-wrap:wrap;

        justify-content:center;
    }

    .hero h1{

        font-size:34px;
    }

    .container{

        margin:25px;
    }
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

    <div class="logo">
        Smart Complaint Routing
    </div>

    <div class="nav-links">

        <a href="/main">
            <button class="nav-btn home-btn">
                Home
            </button>
        </a>

        <a href="/main">
            <button class="nav-btn complaint-btn">
                Complaint
            </button>
        </a>

        <a href="/history">
            <button class="nav-btn history-btn">
                History
            </button>
        </a>

        <a href="/stats">
            <button class="nav-btn stats-btn">
                Statistics
            </button>
        </a>

        <a href="/logout">
            <button class="nav-btn logout-btn">
                Logout
            </button>
        </a>

    </div>

</div>

<!-- HERO -->

<div class="hero">

    <h1>
        AI Powered Complaint Management
    </h1>

    <p>
        Smart routing system using Machine Learning,
        NLP, Email Authentication and Database Analytics
    </p>

</div>

<!-- MAIN CARD -->

<div class="container">

    <h2 class="card-title">
        Submit Your Complaint
    </h2>

    <form method="POST" action="/main">

        <div class="input-group">

            <label>
                📍 Area
            </label>

            <input
                type="text"
                name="area"
                placeholder="Enter your area"
                required
            >

        </div>

        <div class="input-group">

            <label>
                📝 Complaint
            </label>

            <textarea
                name="complaint"
                placeholder="Describe your issue clearly..."
                required
            ></textarea>

        </div>

        <button
            type="submit"
            class="submit-btn"
        >
            Submit Complaint 🚀
        </button>

    </form>

    {% if result %}

    <div class="result">

        {{ result }}

    </div>

    {% endif %}

</div>

<!-- FOOTER -->

<div class="footer">

    Built using Flask + Machine Learning + NLP + SQLite

</div>

</body>
</html>
