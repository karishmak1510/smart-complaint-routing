
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Verify OTP</title>

<style>
:root {
    --card: rgba(255,255,255,0.85);
    --primary: #2563eb;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    width: 340px;
    padding: 30px;
    border-radius: 18px;
    background: var(--card);
    backdrop-filter: blur(15px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.3);
    text-align: center;
}

h2 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    text-align: center;
    font-size: 18px;
    letter-spacing: 3px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 18px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

.note {
    font-size: 12px;
    margin-top: 10px;
    opacity: 0.7;
}
</style>

</head>
<body>

<div class="container">
    <h2>🔑 Verify OTP</h2>

    <form method="POST" action="/verify">
        <input type="hidden" name="phone" value="{{ phone }}">
        <input type="text" name="otp" placeholder="Enter OTP" required>
        <button type="submit">Verify</button>
    </form>
<!-- 🔴 YAHAN ADD KARNA HAI -->
{% if error %}
<div style="
    color: #ff4d4d;
    background: rgba(255,0,0,0.1);
    padding: 8px;
    margin-top: 10px;
    border-radius: 6px;
">
    {{ error }}
</div>
{% endif %}
    <div class="note">
        OTP sent to your number (check terminal)
    </div>
</div>

</body>
</html>
