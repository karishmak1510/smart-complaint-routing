<!DOCTYPE html>
<html>

<head>

<title>Complaint History</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fb;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:15px;
    border-bottom:1px solid #ddd;
    text-align:left;
}

th{
    background:#2563eb;
    color:white;
}

tr:hover{
    background:#f1f5f9;
}

a{
    text-decoration:none;
    color:#2563eb;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<a href="/main">
⬅ Back
</a>

<h1>Your Complaint History</h1>

<table>

<tr>
    <th>Complaint</th>
    <th>Department</th>
    <th>Status</th>
    <th>Date</th>
</tr>

{% for c in complaints %}

<tr>
    <td>{{ c[0] }}</td>
    <td>{{ c[1] }}</td>
    <td>{{ c[2] }}</td>
    <td>{{ c[3] }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
